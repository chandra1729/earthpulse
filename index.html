<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EARTHPULSE | SIGINT TERMINAL v0.4</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-left">
    <h1>NEWS - WHAT IT MEANS</h1>
    <div class="live-indicator">
      <span id="live-dot"></span> 
      <span style="font-family:monospace; font-size:10px; color:#444;">NODE: GLOBAL_v4.5</span> | 
      <span id="last-updated" style="color:#666; font-family:monospace; font-size:10px">SCANNING...</span>
    </div>
  </div>
</header>

<main class="main-container">
  <aside class="trending-section">
    <div style="color:#222; margin-bottom:12px; font-size:9px; font-family:monospace; font-weight:bold; letter-spacing:1px;">LOCAL_TRENDS</div>
    <div id="trending-signals"></div>
  </aside>

  <section class="tiles" id="tiles"></section>

  <aside class="sponsor-section">
    <div style="color:#222; margin-bottom:12px; font-size:9px; font-family:monospace; font-weight:bold; letter-spacing:1px;">PARTNERS</div>
    <div id="sponsor-column"></div>
  </aside>
</main>

<div class="legend-panel">
  <div class="legend-item">SIG_INT: ACTIVE</div>
  <div class="legend-item">DECRYPT: AUTO</div>
  <div class="legend-item">SYNC: 45M</div>
</div>

<footer class="density-footer">
  <span id="signal-count" style="font-size:9px; font-family:monospace; color:#222">0 SIGNALS</span>
  <div id="density-bar"><div id="density-fill"></div></div>
</footer>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
