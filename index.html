<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EarthPulse Signals | Terminal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-left">
    <h1>EarthPulse Signals</h1>
    <div class="live-indicator"><span id="live-dot"></span> SYSTEM LIVE</div>
  </div>
  <div class="header-right">
    <input type="text" placeholder="QUERY SYSTEM..." id="system-search">
  </div>
</header>

<main class="main-container">
  <aside class="trending-section">
    <div class="trending-title">TRENDING_SIGNALS</div>
    <div id="trending-signals"></div>
  </aside>

  <section class="tiles" id="tiles"></section>

  <aside class="sponsor-section">
    <div class="sponsor-title">PARTNERS</div>
    <div id="sponsor-column"></div>
  </aside>
</main>

<div class="legend-panel">
  <div class="legend-item"><b>VELOCITY:</b> ↑↑ → ↓</div>
  <div class="legend-item"><b>IMPACT:</b> 0-100 SCALAR</div>
  <div class="legend-item"><b>CONTEXT:</b> PERS / SYS / FUTR</div>
</div>

<footer class="density-footer">
  <span id="signal-count">0 SIGNALS</span>
  <div id="density-bar"><div id="density-fill"></div></div>
</footer>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
